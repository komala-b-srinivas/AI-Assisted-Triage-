<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Triage - Model Output & Override</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            display: flex;
            gap: 20px;
            max-width: 1200px;
            width: 100%;
        }
        .panel {
            flex: 1;
            background: white;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .panel-title {
            font-size: 18px;
            font-weight: 600;
            color: #1565C0;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #E6F0FF;
        }
        .progress-section {
            margin-bottom: 24px;
        }
        .progress-label {
            font-size: 14px;
            color: #424242;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .progress-bar {
            width: 100%;
            height: 32px;
            background: #E0E0E0;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #1E88E5, #42A5F5);
            width: 84%;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 12px;
            color: white;
            font-weight: 600;
            font-size: 14px;
        }
        .risk-label {
            font-size: 20px;
            color: #424242;
            margin: 20px 0;
            font-weight: 600;
        }
        .risk-value {
            color: #E53935;
        }
        .chart {
            display: flex;
            gap: 20px;
            align-items: flex-end;
            height: 180px;
            margin-top: 20px;
            padding: 0 10px;
        }
        .bar-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .bar {
            width: 100%;
            background: #1E88E5;
            border-radius: 4px 4px 0 0;
            position: relative;
        }
        .bar.low {
            height: 50px;
            background: #FFA726;
        }
        .bar.high {
            height: 120px;
            background: #E53935;
        }
        .bar-label {
            font-size: 13px;
            color: #424242;
            font-weight: 500;
            text-align: center;
        }
        .bar-status {
            font-size: 11px;
            color: #757575;
            text-align: center;
        }
        .alert-banner {
            background: #E53935;
            color: white;
            padding: 16px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 14px;
        }
        .override-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        .override-table td {
            padding: 12px;
            border-bottom: 1px solid #E0E0E0;
            font-size: 14px;
            color: #424242;
        }
        .override-table td:first-child {
            font-weight: 600;
            color: #1565C0;
        }
        .override-table td:last-child {
            text-align: right;
            color: #757575;
            font-style: italic;
        }
        .notes-section {
            margin-bottom: 20px;
        }
        .notes-label {
            font-size: 14px;
            color: #424242;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .notes-box {
            width: 100%;
            height: 80px;
            border: 1px solid #BDBDBD;
            border-radius: 4px;
            padding: 12px;
            font-size: 13px;
            font-family: inherit;
            resize: none;
            box-sizing: border-box;
        }
        .button-group {
            display: flex;
            gap: 12px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .btn-danger {
            background: #E53935;
            color: white;
        }
        .btn-secondary {
            background: #9E9E9E;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Left Panel -->
        <div class="panel">
            <div class="panel-title">Model Output</div>
            
            <div class="progress-section">
                <div class="progress-label">Admission Probability: 0.84</div>
                <div class="progress-bar">
                    <div class="progress-fill">84%</div>
                </div>
            </div>
            
            <div class="risk-label">
                Predicted Risk: <span class="risk-value">ESI 2 (High)</span>
            </div>
            
            <div class="chart">
                <div class="bar-container">
                    <div class="bar low"></div>
                    <div class="bar-label">SBP</div>
                    <div class="bar-status">(Low)</div>
                </div>
                <div class="bar-container">
                    <div class="bar high"></div>
                    <div class="bar-label">HR</div>
                    <div class="bar-status">(High)</div>
                </div>
                <div class="bar-container">
                    <div class="bar low"></div>
                    <div class="bar-label">SpO₂</div>
                    <div class="bar-status">(Low)</div>
                </div>
            </div>
        </div>
        
        <!-- Right Panel -->
        <div class="panel">
            <div class="panel-title">Safety Override + Nurse Confirmation</div>
            
            <div class="alert-banner">
                ⚠ Critical: Safety Rules Triggered – SBP&lt;90, SpO₂&lt;90
            </div>
            
            <table class="override-table">
                <tr>
                    <td>SBP</td>
                    <td>Override</td>
                </tr>
                <tr>
                    <td>SpO₂</td>
                    <td>Override</td>
                </tr>
                <tr>
                    <td>Shock Index</td>
                    <td>Override</td>
                </tr>
            </table>
            
            <div class="notes-section">
                <div class="notes-label">Nurse Notes</div>
                <textarea class="notes-box" placeholder="Enter clinical notes and rationale for override..."></textarea>
            </div>
            
            <div class="button-group">
                <button class="btn btn-danger">Confirm Override</button>
                <button class="btn btn-secondary">Review Manually</button>
            </div>
        </div>
    </div>
</body>
</html>
